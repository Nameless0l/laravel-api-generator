<svg viewBox="0 0 1280 560" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9a9aa2"/>
    </marker>
  </defs>

  <!-- pipeline de la requête -->
  <rect x="15" y="150" width="170" height="84" rx="42" fill="#8c8c96" fill-opacity="0.07" stroke="#94949c" stroke-opacity="0.5" stroke-width="2"/>
  <text x="100" y="199" text-anchor="middle" font-size="19" font-weight="600" fill="#82828c">Requête HTTP</text>

  <rect x="235" y="150" width="170" height="84" rx="12" fill="#8c8c96" fill-opacity="0.07" stroke="#94949c" stroke-opacity="0.5" stroke-width="2"/>
  <text x="320" y="190" text-anchor="middle" font-size="19" font-weight="600" fill="#82828c">FormRequest</text>
  <text x="320" y="216" text-anchor="middle" font-size="13" fill="#8e8e96">validation</text>

  <rect x="455" y="150" width="170" height="84" rx="12" fill="#ff2d20" fill-opacity="0.06" stroke="#f43f33" stroke-opacity="0.75" stroke-width="2"/>
  <text x="540" y="190" text-anchor="middle" font-size="19" font-weight="600" fill="#f43f33">Contrôleur</text>
  <text x="540" y="216" text-anchor="middle" font-size="13" fill="#8e8e96">fin</text>

  <rect x="675" y="150" width="170" height="84" rx="12" fill="#ff2d20" fill-opacity="0.06" stroke="#f43f33" stroke-opacity="0.75" stroke-width="2"/>
  <text x="760" y="190" text-anchor="middle" font-size="19" font-weight="600" fill="#f43f33">Service</text>
  <text x="760" y="216" text-anchor="middle" font-size="13" fill="#8e8e96">logique métier</text>

  <rect x="895" y="150" width="170" height="84" rx="12" fill="#8c8c96" fill-opacity="0.07" stroke="#94949c" stroke-opacity="0.5" stroke-width="2"/>
  <text x="980" y="199" text-anchor="middle" font-size="19" font-weight="600" fill="#82828c">Modèle</text>

  <!-- cylindre base de données -->
  <path d="M1115 172 v56 a70 14 0 0 0 140 0 v-56" fill="#8c8c96" fill-opacity="0.07" stroke="#94949c" stroke-opacity="0.5" stroke-width="2"/>
  <ellipse cx="1185" cy="172" rx="70" ry="14" fill="#8c8c96" fill-opacity="0.07" stroke="#94949c" stroke-opacity="0.5" stroke-width="2"/>
  <text x="1185" y="215" text-anchor="middle" font-size="19" font-weight="600" fill="#82828c">BDD</text>

  <!-- branche réponse -->
  <rect x="455" y="400" width="170" height="84" rx="12" fill="#8c8c96" fill-opacity="0.07" stroke="#94949c" stroke-opacity="0.5" stroke-width="2"/>
  <text x="540" y="440" text-anchor="middle" font-size="19" font-weight="600" fill="#82828c">Resource</text>
  <text x="540" y="466" text-anchor="middle" font-size="13" fill="#8e8e96">sérialisation</text>

  <rect x="675" y="400" width="170" height="84" rx="42" fill="#8c8c96" fill-opacity="0.07" stroke="#94949c" stroke-opacity="0.5" stroke-width="2"/>
  <text x="760" y="449" text-anchor="middle" font-size="19" font-weight="600" fill="#82828c">Réponse JSON</text>

  <!-- flèches -->
  <line x1="187" y1="192" x2="231" y2="192" stroke="#9a9aa2" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="407" y1="192" x2="451" y2="192" stroke="#9a9aa2" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="629" y1="192" x2="671" y2="192" stroke="#9a9aa2" stroke-width="2" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="650" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#8e8e96">DTO</text>
  <line x1="849" y1="192" x2="891" y2="192" stroke="#9a9aa2" stroke-width="2" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <line x1="1069" y1="192" x2="1111" y2="192" stroke="#9a9aa2" stroke-width="2" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <line x1="540" y1="238" x2="540" y2="396" stroke="#9a9aa2" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="629" y1="442" x2="671" y2="442" stroke="#9a9aa2" stroke-width="2" marker-end="url(#arr)"/>
