<svg xmlns="http://www.w3.org/2000/svg" width="850" height="580" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="14">
  <style>
    .bg { fill: #1e1e2e; }
    .title-bar { fill: #313244; }
    .title-text { fill: #cdd6f4; font-size: 13px; }
    .prompt { fill: #a6e3a1; }
    .command { fill: #cdd6f4; }
    .flag { fill: #89b4fa; }
    .info { fill: #89dceb; }
    .success { fill: #a6e3a1; }
    .warning { fill: #f9e2af; }
    .file { fill: #cba6f7; }
    .dim { fill: #6c7086; }
    .arrow { fill: #f38ba8; }
    .url { fill: #89b4fa; text-decoration: underline; }

    @keyframes typing { from { width: 0; } to { width: 100%; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    .step1 { animation: fadeIn 0.5s ease-in 0.5s both; }
    .step2 { animation: fadeIn 0.5s ease-in 2s both; }
    .step3 { animation: fadeIn 0.5s ease-in 3.5s both; }
    .step4 { animation: fadeIn 0.5s ease-in 5s both; }
    .step5 { animation: fadeIn 0.5s ease-in 7s both; }
    .step6 { animation: fadeIn 0.5s ease-in 9s both; }
    .step7 { animation: fadeIn 0.5s ease-in 10.5s both; }
    .step8 { animation: fadeIn 0.5s ease-in 12s both; }

    .cursor { animation: blink 1s step-end infinite; fill: #cdd6f4; }
  </style>

  <!-- Background -->
  <rect class="bg" width="850" height="580" rx="10"/>

  <!-- Title bar -->
  <rect class="title-bar" width="850" height="35" rx="10"/>
  <rect class="bg" y="25" width="850" height="10"/>
  <circle cx="20" cy="17" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="17" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="17" r="6" fill="#a6e3a1"/>
  <text class="title-text" x="425" y="22" text-anchor="middle">Laravel API Generator v3.3.0 — Terminal</text>

  <!-- Step 1: Generate API -->
  <g class="step1">
    <text class="prompt" x="20" y="65">$</text>
    <text class="command" x="35" y="65">php artisan make:fullapi Product</text>
    <text class="flag" x="365" y="65">--fields="name:string,price:float,description:text"</text>
  </g>

  <!-- Step 2: Generated files output -->
  <g class="step2">
    <text class="info" x="20" y="95">Generating complete API for: Product</text>
    <text class="dim" x="20" y="115">Generated files:</text>
    <text class="file" x="30" y="135">- Model:      app/Models/Product.php</text>
    <text class="file" x="30" y="155">- Controller: app/Http/Controllers/ProductController.php</text>
    <text class="file" x="30" y="175">- Service:    app/Services/ProductService.php</text>
    <text class="file" x="30" y="195">- DTO:        app/DTO/ProductDTO.php</text>
    <text class="file" x="30" y="215">- Request:    app/Http/Requests/ProductRequest.php</text>
    <text class="file" x="30" y="235">- Migration:  database/migrations/*_create_products_table.php</text>
    <text class="file" x="30" y="255">- Tests:      tests/Feature + tests/Unit</text>
    <text class="dim" x="30" y="275">  ... +5 more files (Resource, Policy, Factory, Seeder, Route)</text>
  </g>

  <!-- Step 3: Auto-register routes -->
  <g class="step3">
    <text class="success" x="20" y="305">✔ API routes registered in bootstrap/app.php</text>
    <text class="success" x="20" y="325">✔ Seeder registered in DatabaseSeeder.php</text>
  </g>

  <!-- Step 4: Migrate and seed -->
  <g class="step4">
    <text class="prompt" x="20" y="355">$</text>
    <text class="command" x="35" y="355">php artisan migrate:fresh --seed</text>
    <text class="info" x="20" y="375">Running migrations... </text>
    <text class="success" x="200" y="375">DONE</text>
    <text class="info" x="20" y="395">Seeding database... </text>
    <text class="success" x="195" y="395">10 products created</text>
  </g>

  <!-- Step 5: Run tests -->
  <g class="step5">
    <text class="prompt" x="20" y="425">$</text>
    <text class="command" x="35" y="425">php artisan test --filter=Product</text>
    <text class="success" x="20" y="445">✓ can list products</text>
    <text class="success" x="250" y="445">✓ can create product</text>
    <text class="success" x="480" y="445">✓ can show product</text>
    <text class="success" x="20" y="465">✓ can update product</text>
    <text class="success" x="250" y="465">✓ can delete product</text>
    <text class="success" x="480" y="465">✓ validates required fields</text>
    <text class="success" x="20" y="485">✓ can get all (service)</text>
    <text class="success" x="250" y="485">✓ can filter (service)</text>
    <text class="success" x="480" y="485">✓ can create (service)</text>
    <text class="success" x="20" y="505">✓ can find (service)</text>
    <text class="success" x="250" y="505">✓ can update (service)</text>
    <text class="success" x="480" y="505">✓ can delete (service)</text>
  </g>

  <!-- Step 6: Results -->
  <g class="step6">
    <text class="success" x="20" y="535">PASSED  12 tests, 19 assertions</text>
  </g>

  <!-- Step 7: Scramble -->
  <g class="step7">
    <text class="prompt" x="20" y="560">$</text>
    <text class="command" x="35" y="560">open</text>
    <text class="url" x="72" y="560">http://localhost:8000/docs/api</text>
    <text class="arrow" x="370" y="560">→</text>
    <text class="warning" x="390" y="560">Swagger UI with all endpoints ready!</text>
  </g>
</svg>
